services:
  crap:
    build: .
    container_name: crap
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Analytics — baked into JS bundle at build time (NEXT_PUBLIC_* vars).
      # Pass them as build args in CI/CD if you want them injected during docker build.
      # - NEXT_PUBLIC_GA_MEASUREMENT_ID=
      # - NEXT_PUBLIC_POSTHOG_KEY=
      # - NEXT_PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com
    labels:
      - "traefik.enable=true"

      # Main domain routing
      - "traefik.http.routers.crap-secure.entrypoints=websecure"
      - "traefik.http.routers.crap-secure.rule=Host(`cyberchecklist.app`) || Host(`www.cyberchecklist.app`)"
      - "traefik.http.routers.crap-secure.tls=true"
      - "traefik.http.routers.crap-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.crap.loadbalancer.server.port=3000"
    networks:
      - proxy

networks:
  proxy:
    external: true
